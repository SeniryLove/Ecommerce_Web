name: Deploy Frontend

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install


      - name: test env
        run: echo $VITE_BACKEND_HOST && echo $VITE_BASE
        env:
          VITE_BACKEND_HOST: ${{ secrets.VITE_BACKEND_HOST }}
          VITE_BASE: ${{ secrets.VITE_BASE }}

      - name: Build project
        run: npm run build
        env:
          VITE_BACKEND_HOST: ${{ secrets.VITE_BACKEND_HOST }}
          VITE_BASE: ${{ secrets.VITE_BASE }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
